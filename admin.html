<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | متجر الخير</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { max-width: 750px; margin: 40px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        input[type="text"], select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; outline: none; transition: 0.3s; font-family: 'Cairo'; }
        input[type="text"]:focus, select:focus { border-color: #D97706; }
        
        .admin-btn { 
            background: linear-gradient(135deg, #D97706 0%, #B45309 100%); 
            color: white; border: none; padding: 16px; width: 100%; 
            border-radius: 50px; font-weight: 700; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(217, 119, 6, 0.3); transition: 0.3s;
        }
        .admin-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(217, 119, 6, 0.4); }

        #imgPreviewContainer { display: flex; gap: 12px; flex-wrap: wrap; margin: 15px 0; }
        .preview-item { position: relative; width: 90px; height: 90px; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; border: 2px solid #D97706; }
        .remove-img-btn { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .admin-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; }
        .admin-item img { width: 55px; height: 55px; border-radius: 8px; object-fit: cover; }
        .actions-btns { display: flex; gap: 8px; }
        .edit-action { background: #f3f4f6; color: #1f2937; border: none; padding: 8px 15px; border-radius: 50px; cursor: pointer; }
        .del-action { background: #fee2e2; color: #dc2626; border: none; padding: 8px 15px; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h2 id="formTitle" style="color:#1f2937; margin-bottom:20px;">إضافة منتج جديد للمتجر</h2>
        <input type="hidden" id="editKey" value="">
        
        <div class="form-group"><label>اسم المنتج</label><input type="text" id="pName" placeholder="مثلاً: طقم فناجين"></div>
        <div class="form-group"><label>السعر</label><input type="text" id="pPrice" placeholder="180 MAD"></div>
        
        <div class="form-group">
            <label>تصنيف المنتج</label>
            <select id="pCategory">
                <option value="normal">أواني منزلية عادية</option>
                <option value="electrical">تجهيزات كهربائية</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>صور المنتج</label>
            <input type="file" id="pImgFile" multiple accept="image/*" onchange="handleMultipleFiles(this)">
            <div id="imgPreviewContainer"></div>
        </div>

        <div class="form-group"><label>وصف المنتج</label><div id="editor"></div></div>

        <button class="admin-btn" onclick="handleSave()">حفظ ونشر أونلاين</button>
        <button id="cancelBtn" style="display:none; background:#6b7280; margin-top:10px;" class="admin-btn" onclick="resetForm()">إلغاء التعديل</button>

        <div id="adminList" style="margin-top:30px;">جاري تحميل المنتجات...</div>
        <a href="index.html" style="display:block; text-align:center; margin-top:25px; color:#D97706; text-decoration:none; font-weight:bold;">العودة للمتجر</a>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBbraVWA6lda9zMobQluPWy02tOZ0A8EVc",
            authDomain: "awani-alkhayr-store.firebaseapp.com",
            projectId: "awani-alkhayr-store",
            storageBucket: "awani-alkhayr-store.firebasestorage.app",
            messagingSenderId: "381565242398",
            appId: "1:381565242398:web:68e21916d12edec276b20f",
            measurementId: "G-D3R6BLKVHP",
            databaseURL: "https://awani-alkhayr-store-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        var quill = new Quill('#editor', { theme: 'snow' });
        let currentImagesArray = [];
        let allProducts = {};

        window.handleMultipleFiles = (input) => {
            const files = Array.from(input.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onloadend = () => {
                    currentImagesArray.push(reader.result);
                    renderImagesPreview();
                };
                reader.readAsDataURL(file);
            });
            input.value = ""; 
        };

        function renderImagesPreview() {
            const container = document.getElementById('imgPreviewContainer');
            container.innerHTML = "";
            currentImagesArray.forEach((src, idx) => {
                container.innerHTML += `
                    <div class="preview-item">
                        <img src="${src}">
                        <button class="remove-img-btn" onclick="removeSpecificImg(${idx})">×</button>
                    </div>`;
            });
        }

        window.removeSpecificImg = (idx) => {
            currentImagesArray.splice(idx, 1);
            renderImagesPreview();
        };

        window.handleSave = () => {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const category = document.getElementById('pCategory').value;
            const key = document.getElementById('editKey').value;
            
            if(!name || !price || currentImagesArray.length === 0) return alert("يرجى ملء كافة الخانات واختيار صورة");

            const data = { 
                title: name, 
                price: price, 
                category: category,
                images: currentImagesArray, 
                desc: quill.root.innerHTML 
            };

            if(key === "") {
                push(ref(db, 'products'), data).then(() => {
                    alert("تمت الإضافة بنجاح");
                    resetForm();
                });
            } else {
                update(ref(db, 'products/' + key), data).then(() => {
                    alert("تم التعديل بنجاح");
                    resetForm();
                });
            }
        };

        onValue(ref(db, 'products'), (snapshot) => {
            allProducts = snapshot.val() || {};
            const container = document.getElementById('adminList');
            container.innerHTML = "<h3>المنتجات المنشورة:</h3>";
            
            for (let key in allProducts) {
                const p = allProducts[key];
                const catName = p.category === 'electrical' ? 'كهربائية' : 'عادية';
                const firstImg = (p.images && p.images.length > 0) ? p.images[0] : '';
                container.innerHTML += `
                    <div class="admin-item">
                        <img src="${firstImg}">
                        <span style="flex-grow:1; margin-right:15px; font-weight:600;">${p.title} (${catName})</span>
                        <div class="actions-btns">
                            <button class="edit-action" onclick="startEdit('${key}')">تعديل</button>
                            <button class="del-action" onclick="deleteProduct('${key}')">حذف</button>
                        </div>
                    </div>`;
            }
        });

        window.startEdit = (key) => {
            const p = allProducts[key];
            document.getElementById('pName').value = p.title;
            document.getElementById('pPrice').value = p.price;
            document.getElementById('pCategory').value = p.category || 'normal';
            currentImagesArray = p.images ? [...p.images] : [];
            renderImagesPreview();
            quill.root.innerHTML = p.desc;
            document.getElementById('editKey').value = key;
            document.getElementById('formTitle').innerText = "تعديل منتج: " + p.title;
            document.getElementById('cancelBtn').style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.deleteProduct = (key) => {
            if(confirm("هل أنت متأكد من حذف هذا المنتج؟")) {
                remove(ref(db, 'products/' + key));
            }
        };

        window.resetForm = () => {
            document.getElementById('pName').value = "";
            document.getElementById('pPrice').value = "";
            document.getElementById('pCategory').value = "normal";
            currentImagesArray = [];
            renderImagesPreview();
            quill.root.innerHTML = "";
            document.getElementById('editKey').value = "";
            document.getElementById('formTitle').innerText = "إضافة منتج جديد";
            document.getElementById('cancelBtn').style.display = "none";
        };
    </script>
</body>
</html>
